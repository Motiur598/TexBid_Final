<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RFQ Management - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">
    <!-- Admin Navigation -->
    <nav class="bg-slate-900 border-b border-slate-700 shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center gap-4">
                    <a href="/admin/dashboard" class="bg-blue-600 p-2 rounded-lg hover:bg-blue-700 transition-colors">
                        <svg class="h-6 w-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                        </svg>
                    </a>
                    <div>
                        <h1 class="text-xl font-bold text-white">RFQ Management</h1>
                        <p class="text-xs text-slate-400">View all RFQs and auctions</p>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <span class="text-sm text-slate-300" id="admin-email"></span>
                    <button onclick="logout()" class="px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg text-sm font-semibold transition-colors">
                        Logout
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Stats -->
        <div class="grid grid-cols-1 md:grid-cols-5 gap-6 mb-8">
            <div class="bg-white rounded-xl shadow-md p-6 border border-slate-200">
                <h3 class="text-sm font-semibold text-slate-600 mb-2">Total RFQs</h3>
                <p class="text-3xl font-bold text-slate-900" id="total-rfqs">-</p>
            </div>
            <div class="bg-white rounded-xl shadow-md p-6 border border-slate-200">
                <h3 class="text-sm font-semibold text-slate-600 mb-2">Open</h3>
                <p class="text-3xl font-bold text-green-600" id="open-rfqs">-</p>
            </div>
            <div class="bg-white rounded-xl shadow-md p-6 border border-slate-200">
                <h3 class="text-sm font-semibold text-slate-600 mb-2">Evaluating</h3>
                <p class="text-3xl font-bold text-yellow-600" id="evaluating-rfqs">-</p>
            </div>
            <div class="bg-white rounded-xl shadow-md p-6 border border-slate-200">
                <h3 class="text-sm font-semibold text-slate-600 mb-2">Awarded</h3>
                <p class="text-3xl font-bold text-blue-600" id="awarded-rfqs">-</p>
            </div>
            <div class="bg-white rounded-xl shadow-md p-6 border border-slate-200">
                <h3 class="text-sm font-semibold text-slate-600 mb-2">Reverse Auctions</h3>
                <p class="text-3xl font-bold text-purple-600" id="auction-rfqs">-</p>
            </div>
        </div>

        <!-- RFQs Table -->
        <div class="bg-white rounded-xl shadow-md border border-slate-200">
            <div class="p-6 border-b border-slate-200">
                <h2 class="text-2xl font-bold text-slate-900">All RFQs</h2>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead class="bg-slate-50 border-b border-slate-200">
                        <tr>
                            <th class="px-6 py-4 text-left text-xs font-semibold text-slate-600 uppercase tracking-wider">Title</th>
                            <th class="px-6 py-4 text-left text-xs font-semibold text-slate-600 uppercase tracking-wider">Buyer ID</th>
                            <th class="px-6 py-4 text-left text-xs font-semibold text-slate-600 uppercase tracking-wider">Category</th>
                            <th class="px-6 py-4 text-left text-xs font-semibold text-slate-600 uppercase tracking-wider">Quantity</th>
                            <th class="px-6 py-4 text-left text-xs font-semibold text-slate-600 uppercase tracking-wider">Status</th>
                            <th class="px-6 py-4 text-left text-xs font-semibold text-slate-600 uppercase tracking-wider">Type</th>
                            <th class="px-6 py-4 text-left text-xs font-semibold text-slate-600 uppercase tracking-wider">Created</th>
                        </tr>
                    </thead>
                    <tbody id="rfqs-table" class="divide-y divide-slate-200">
                        <tr>
                            <td colspan="7" class="px-6 py-12 text-center text-slate-500">
                                <svg class="animate-spin h-8 w-8 text-blue-600 mx-auto mb-2" fill="none" viewBox="0 0 24 24">
                                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                </svg>
                                Loading RFQs...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        async function loadAdminInfo() {
            try {
                const response = await fetch('/api/admin/me');
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('admin-email').textContent = data.email;
                } else {
                    window.location.href = '/admin/login';
                }
            } catch (error) {
                window.location.href = '/admin/login';
            }
        }

        async function loadRFQs() {
            try {
                const response = await fetch('/api/admin/rfqs');
                const data = await response.json();
                
                if (data.success) {
                    const rfqs = data.rfqs;
                    
                    // Update stats
                    document.getElementById('total-rfqs').textContent = rfqs.length;
                    document.getElementById('open-rfqs').textContent = rfqs.filter(r => r.status === 'OPEN').length;
                    document.getElementById('evaluating-rfqs').textContent = rfqs.filter(r => r.status === 'EVALUATING').length;
                    document.getElementById('awarded-rfqs').textContent = rfqs.filter(r => r.status === 'AWARDED').length;
                    document.getElementById('auction-rfqs').textContent = rfqs.filter(r => r.is_reverse_auction).length;
                    
                    // Render table
                    const tbody = document.getElementById('rfqs-table');
                    
                    if (rfqs.length === 0) {
                        tbody.innerHTML = `
                            <tr>
                                <td colspan="7" class="px-6 py-12 text-center text-slate-500">
                                    No RFQs found
                                </td>
                            </tr>
                        `;
                        return;
                    }
                    
                    tbody.innerHTML = rfqs.map(rfq => `
                        <tr class="hover:bg-slate-50 transition-colors">
                            <td class="px-6 py-4">
                                <div class="font-medium text-slate-900">${rfq.title}</div>
                                <div class="text-xs text-slate-500">${rfq.id.substring(0, 12)}...</div>
                            </td>
                            <td class="px-6 py-4">
                                <code class="bg-slate-100 px-2 py-1 rounded text-xs text-slate-700">${rfq.buyer_id.substring(0, 8)}...</code>
                            </td>
                            <td class="px-6 py-4 text-sm text-slate-700">
                                ${rfq.product_category}
                            </td>
                            <td class="px-6 py-4 text-sm font-semibold text-slate-900">
                                ${rfq.quantity.toLocaleString()} units
                            </td>
                            <td class="px-6 py-4">
                                ${getStatusBadge(rfq.status)}
                            </td>
                            <td class="px-6 py-4">
                                ${rfq.is_reverse_auction 
                                    ? '<span class="px-3 py-1 bg-purple-100 text-purple-700 text-xs font-semibold rounded-full">⚡ Auction</span>'
                                    : '<span class="px-3 py-1 bg-slate-100 text-slate-700 text-xs font-semibold rounded-full">Standard</span>'
                                }
                            </td>
                            <td class="px-6 py-4 text-sm text-slate-600">
                                ${formatDate(rfq.created_at)}
                            </td>
                        </tr>
                    `).join('');
                }
            } catch (error) {
                console.error('Error loading RFQs:', error);
                document.getElementById('rfqs-table').innerHTML = `
                    <tr>
                        <td colspan="7" class="px-6 py-12 text-center text-red-500">
                            Error loading RFQs
                        </td>
                    </tr>
                `;
            }
        }

        function getStatusBadge(status) {
            const badges = {
                'DRAFT': '<span class="px-3 py-1 bg-slate-100 text-slate-700 text-xs font-semibold rounded-full">Draft</span>',
                'OPEN': '<span class="px-3 py-1 bg-green-100 text-green-700 text-xs font-semibold rounded-full">✓ Open</span>',
                'EVALUATING': '<span class="px-3 py-1 bg-yellow-100 text-yellow-700 text-xs font-semibold rounded-full">⏳ Evaluating</span>',
                'AWARDED': '<span class="px-3 py-1 bg-blue-100 text-blue-700 text-xs font-semibold rounded-full">🏆 Awarded</span>',
                'CLOSED': '<span class="px-3 py-1 bg-red-100 text-red-700 text-xs font-semibold rounded-full">Closed</span>'
            };
            return badges[status] || status;
        }

        function formatDate(dateString) {
            if (!dateString) return 'N/A';
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', { 
                year: 'numeric', 
                month: 'short', 
                day: 'numeric'
            });
        }

        async function logout() {
            try {
                await fetch('/api/logout', { method: 'POST' });
                window.location.href = '/admin/login';
            } catch (error) {
                window.location.href = '/admin/login';
            }
        }

        loadAdminInfo();
        loadRFQs();
    </script>
</body>
</html>
