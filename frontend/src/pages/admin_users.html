<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">
    <!-- Admin Navigation -->
    <nav class="bg-slate-900 border-b border-slate-700 shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center gap-4">
                    <a href="/admin/dashboard" class="bg-blue-600 p-2 rounded-lg hover:bg-blue-700 transition-colors">
                        <svg class="h-6 w-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                        </svg>
                    </a>
                    <div>
                        <h1 class="text-xl font-bold text-white">User Management</h1>
                        <p class="text-xs text-slate-400">View and manage all users</p>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <span class="text-sm text-slate-300" id="admin-email"></span>
                    <button onclick="logout()" class="px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg text-sm font-semibold transition-colors">
                        Logout
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Stats -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white rounded-xl shadow-md p-6 border border-slate-200">
                <h3 class="text-sm font-semibold text-slate-600 mb-2">Total Users</h3>
                <p class="text-3xl font-bold text-slate-900" id="total-users">-</p>
            </div>
            <div class="bg-white rounded-xl shadow-md p-6 border border-slate-200">
                <h3 class="text-sm font-semibold text-slate-600 mb-2">Admin Users</h3>
                <p class="text-3xl font-bold text-blue-600" id="admin-users">-</p>
            </div>
            <div class="bg-white rounded-xl shadow-md p-6 border border-slate-200">
                <h3 class="text-sm font-semibold text-slate-600 mb-2">Regular Users</h3>
                <p class="text-3xl font-bold text-green-600" id="regular-users">-</p>
            </div>
        </div>

        <!-- Users Table -->
        <div class="bg-white rounded-xl shadow-md border border-slate-200">
            <div class="p-6 border-b border-slate-200">
                <h2 class="text-2xl font-bold text-slate-900">All Users</h2>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead class="bg-slate-50 border-b border-slate-200">
                        <tr>
                            <th class="px-6 py-4 text-left text-xs font-semibold text-slate-600 uppercase tracking-wider">Email</th>
                            <th class="px-6 py-4 text-left text-xs font-semibold text-slate-600 uppercase tracking-wider">Company ID</th>
                            <th class="px-6 py-4 text-left text-xs font-semibold text-slate-600 uppercase tracking-wider">Role</th>
                            <th class="px-6 py-4 text-left text-xs font-semibold text-slate-600 uppercase tracking-wider">Created</th>
                            <th class="px-6 py-4 text-left text-xs font-semibold text-slate-600 uppercase tracking-wider">Last Login</th>
                        </tr>
                    </thead>
                    <tbody id="users-table" class="divide-y divide-slate-200">
                        <tr>
                            <td colspan="5" class="px-6 py-12 text-center text-slate-500">
                                <svg class="animate-spin h-8 w-8 text-blue-600 mx-auto mb-2" fill="none" viewBox="0 0 24 24">
                                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                </svg>
                                Loading users...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Load admin info
        async function loadAdminInfo() {
            try {
                const response = await fetch('/api/admin/me');
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('admin-email').textContent = data.email;
                } else {
                    window.location.href = '/admin/login';
                }
            } catch (error) {
                window.location.href = '/admin/login';
            }
        }

        // Load users
        async function loadUsers() {
            try {
                const response = await fetch('/api/admin/users');
                const data = await response.json();
                
                if (data.success) {
                    const users = data.users;
                    
                    // Update stats
                    document.getElementById('total-users').textContent = users.length;
                    document.getElementById('admin-users').textContent = users.filter(u => u.is_admin).length;
                    document.getElementById('regular-users').textContent = users.filter(u => !u.is_admin).length;
                    
                    // Render table
                    const tbody = document.getElementById('users-table');
                    
                    if (users.length === 0) {
                        tbody.innerHTML = `
                            <tr>
                                <td colspan="5" class="px-6 py-12 text-center text-slate-500">
                                    No users found
                                </td>
                            </tr>
                        `;
                        return;
                    }
                    
                    tbody.innerHTML = users.map(user => `
                        <tr class="hover:bg-slate-50 transition-colors">
                            <td class="px-6 py-4">
                                <div class="flex items-center gap-2">
                                    <span class="font-medium text-slate-900">${user.email}</span>
                                    ${user.is_admin ? '<span class="px-2 py-1 bg-blue-100 text-blue-700 text-xs font-bold rounded">ADMIN</span>' : ''}
                                </div>
                            </td>
                            <td class="px-6 py-4 text-sm text-slate-600">
                                ${user.company_id ? `<code class="bg-slate-100 px-2 py-1 rounded text-xs">${user.company_id.substring(0, 8)}...</code>` : '<span class="text-slate-400">No company</span>'}
                            </td>
                            <td class="px-6 py-4">
                                ${user.is_admin 
                                    ? '<span class="px-3 py-1 bg-blue-100 text-blue-700 text-xs font-semibold rounded-full">Admin</span>'
                                    : '<span class="px-3 py-1 bg-green-100 text-green-700 text-xs font-semibold rounded-full">User</span>'
                                }
                            </td>
                            <td class="px-6 py-4 text-sm text-slate-600">
                                ${formatDate(user.created_at)}
                            </td>
                            <td class="px-6 py-4 text-sm text-slate-600">
                                ${user.last_login ? formatDate(user.last_login) : '<span class="text-slate-400">Never</span>'}
                            </td>
                        </tr>
                    `).join('');
                }
            } catch (error) {
                console.error('Error loading users:', error);
                document.getElementById('users-table').innerHTML = `
                    <tr>
                        <td colspan="5" class="px-6 py-12 text-center text-red-500">
                            Error loading users
                        </td>
                    </tr>
                `;
            }
        }

        function formatDate(dateString) {
            if (!dateString) return 'N/A';
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', { 
                year: 'numeric', 
                month: 'short', 
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        async function logout() {
            try {
                await fetch('/api/logout', { method: 'POST' });
                window.location.href = '/admin/login';
            } catch (error) {
                window.location.href = '/admin/login';
            }
        }

        // Initialize
        loadAdminInfo();
        loadUsers();
    </script>
</body>
</html>
