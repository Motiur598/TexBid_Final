{% extends "base.html" %}

{% block title %}{{ error_title or "Error" }} - TexBid{% endblock %}

{% block content %}
<div class="min-h-screen bg-gradient-to-br from-slate-50 to-slate-100 flex items-center justify-center px-4">
    <div class="max-w-md w-full">
        <div class="bg-white rounded-2xl shadow-2xl p-8 text-center">
            <!-- Error Icon -->
            <div class="mb-6">
                <div class="mx-auto w-20 h-20 bg-red-100 rounded-full flex items-center justify-center">
                    <svg class="h-10 w-10 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                    </svg>
                </div>
            </div>

            <!-- Error Title -->
            <h1 class="text-3xl font-bold text-gray-900 mb-4">
                {{ error_title or "Oops! Something went wrong" }}
            </h1>

            <!-- Error Message -->
            <p class="text-gray-600 mb-8 text-lg">
                {{ error_message or "An unexpected error occurred. Please try again." }}
            </p>

            <!-- Action Buttons -->
            <div class="space-y-3">
                <a href="/" class="block w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg transition-colors">
                    Go to Home
                </a>
                <button onclick="window.history.back()" class="block w-full bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold py-3 px-6 rounded-lg transition-colors">
                    Go Back
                </button>
            </div>
        </div>

        <!-- Help Text -->
        <p class="text-center text-gray-500 text-sm mt-6">
            Need help? <a href="/pricing" class="text-blue-600 hover:text-blue-800 font-semibold">Contact Support</a>
        </p>
    </div>
</div>
{% endblock %}
