<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TexBid</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-purple-50 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full">
        <!-- Logo -->
        <div class="text-center mb-8">
            <a href="/" class="inline-block">
                <h1 class="text-4xl font-bold text-blue-700">Tex<span class="text-purple-600">Bid</span></h1>
                <p class="text-gray-600 mt-2">Welcome back!</p>
            </a>
        </div>

        <!-- Login Form -->
        <div class="bg-white rounded-2xl shadow-xl p-8">
            <h2 class="text-2xl font-bold text-gray-900 mb-6">Log In</h2>
            
            {% if error %}
            <div class="bg-red-50 border-2 border-red-200 rounded-lg p-4 mb-6">
                <p class="text-red-800 font-semibold">{{ error }}</p>
            </div>
            {% endif %}

            {% if success %}
            <div class="bg-green-50 border-2 border-green-200 rounded-lg p-4 mb-6">
                <p class="text-green-800 font-semibold">{{ success }}</p>
                {% if generated_id %}
                <div class="mt-4 bg-white border-2 border-green-300 rounded-lg p-4">
                    <p class="text-sm text-gray-700 mb-2">Your Unique ID:</p>
                    <div class="flex items-center justify-between bg-gray-50 rounded px-4 py-3">
                        <code class="text-2xl font-bold text-blue-700">{{ generated_id }}</code>
                        <button onclick="copyToClipboard('{{ generated_id }}')" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded text-sm font-semibold">
                            Copy
                        </button>
                    </div>
                    <p class="text-xs text-red-600 mt-2 font-semibold">⚠️ Save this ID! You'll need it for bidding.</p>
                </div>
                {% endif %}
            </div>
            {% endif %}

            <form method="POST" action="/login" class="space-y-4">
                <div>
                    <label class="block text-sm font-bold text-gray-900 mb-2">Email *</label>
                    <input type="email" name="email" required
                        class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-blue-500 focus:outline-none"
                        placeholder="your@email.com">
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-900 mb-2">Password *</label>
                    <input type="password" name="password" required
                        class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-blue-500 focus:outline-none"
                        placeholder="Enter your password">
                </div>

                <button type="submit" 
                    class="w-full bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-700 hover:to-purple-700 text-white font-bold py-3 px-6 rounded-lg transition-all shadow-lg hover:shadow-xl mt-6">
                    Log In
                </button>
            </form>

            <div class="mt-6 text-center">
                <p class="text-gray-600">Don't have an account? 
                    <a href="/register" class="text-blue-600 hover:text-blue-800 font-semibold">Register</a>
                </p>
            </div>
        </div>

        <div class="text-center mt-6">
            <a href="/" class="text-gray-600 hover:text-gray-900">← Back to Home</a>
        </div>
    </div>

    <script>
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(function() {
                alert('ID copied to clipboard!');
            }, function(err) {
                alert('Failed to copy ID');
            });
        }
    </script>
</body>
</html>
