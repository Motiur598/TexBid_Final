<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - TexBid</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-purple-50 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full">
        <!-- Logo -->
        <div class="text-center mb-8">
            <a href="/" class="inline-block">
                <h1 class="text-4xl font-bold text-blue-700">Tex<span class="text-purple-600">Bid</span></h1>
                <p class="text-gray-600 mt-2">Create your account</p>
            </a>
        </div>

        <!-- Registration Form -->
        <div class="bg-white rounded-2xl shadow-xl p-8">
            <h2 class="text-2xl font-bold text-gray-900 mb-6">Register</h2>
            
            {% if error %}
            <div class="bg-red-50 border-2 border-red-200 rounded-lg p-4 mb-6">
                <p class="text-red-800 font-semibold">{{ error }}</p>
            </div>
            {% endif %}

            <form method="POST" action="/register" class="space-y-4">
                <div>
                    <label class="block text-sm font-bold text-gray-900 mb-2">Company Name *</label>
                    <input type="text" name="company_name" required
                        class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-blue-500 focus:outline-none"
                        placeholder="Your Company Name">
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-900 mb-2">Email *</label>
                    <input type="email" name="email" required
                        class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-blue-500 focus:outline-none"
                        placeholder="your@email.com">
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-900 mb-2">Password *</label>
                    <input type="password" name="password" required minlength="6"
                        class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-blue-500 focus:outline-none"
                        placeholder="Minimum 6 characters">
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-900 mb-2">Confirm Password *</label>
                    <input type="password" name="confirm_password" required minlength="6"
                        class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-blue-500 focus:outline-none"
                        placeholder="Re-enter password">
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-900 mb-2">Role *</label>
                    <select name="role" required
                        class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-blue-500 focus:outline-none">
                        <option value="">Select your role</option>
                        <option value="BUYER">Buyer</option>
                        <option value="SUPPLIER">Supplier</option>
                    </select>
                </div>

                <button type="submit" 
                    class="w-full bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-700 hover:to-purple-700 text-white font-bold py-3 px-6 rounded-lg transition-all shadow-lg hover:shadow-xl mt-6">
                    Create Account
                </button>
            </form>

            <div class="mt-6 text-center">
                <p class="text-gray-600">Already have an account? 
                    <a href="/login" class="text-blue-600 hover:text-blue-800 font-semibold">Log In</a>
                </p>
            </div>
        </div>

        <div class="text-center mt-6">
            <a href="/" class="text-gray-600 hover:text-gray-900">← Back to Home</a>
        </div>
    </div>
</body>
</html>
