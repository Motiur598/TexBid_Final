<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Pricing - TexBid</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-md mx-auto bg-white rounded-lg shadow-lg p-8">
        <h1 class="text-2xl font-bold mb-4">Test Page</h1>
        
        <button onclick="testFunction()" class="w-full bg-blue-600 text-white font-bold py-3 px-6 rounded-lg mb-4">
            Test Button 1
        </button>
        
        <button onclick="alert('Button 2 works!')" class="w-full bg-green-600 text-white font-bold py-3 px-6 rounded-lg">
            Test Button 2 (Simple Alert)
        </button>
        
        <div id="output" class="mt-4 p-4 bg-gray-100 rounded"></div>
    </div>

    <script>
        console.log('Script is loading...');
        
        function testFunction() {
            console.log('Test function called');
            alert('Test function works!');
            document.getElementById('output').innerHTML = 'Button clicked at: ' + new Date().toLocaleTimeString();
        }
        
        console.log('Script loaded successfully');
    </script>
</body>
</html>
